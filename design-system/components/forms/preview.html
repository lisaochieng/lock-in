<!-- @dsCard group="Components" name="Form fields" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Form fields</title>
<style>
  :root {
    --accent: #f2d382;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 40px;
    background: radial-gradient(circle at 20% 18%, #15211c, #0c100e 72%); color: #fff8eb;
  }
  .panel { width: 100%; max-width: 340px; display: grid; gap: 16px; }
  label { display: grid; gap: 6px; position: relative; }
  label > span { font-size: 0.8rem; color: rgba(255, 249, 235, 0.66); }
  input {
    width: 100%; min-height: 38px; border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 7px;
    background: rgba(255, 255, 255, 0.08); color: #fff9ef; outline: none; padding: 0 11px; font: inherit;
  }
  input:focus { border-color: color-mix(in srgb, var(--accent) 82%, transparent); }
  .search-box {
    display: grid; grid-template-columns: 18px 1fr; align-items: center; gap: 8px; min-height: 42px;
    padding: 0 11px; border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 8px; background: rgba(255, 255, 255, 0.08);
  }
  .search-box input { border: 0; background: transparent; padding: 0; min-height: auto; }
  .focused { border-color: color-mix(in srgb, var(--accent) 82%, transparent); }
</style>
</head>
<body>
  <div class="panel">
    <div class="search-box">🔍<input placeholder="search spaces" /></div>
    <label><span>email</span><input type="email" value="student@gmail.com" /></label>
    <label><span>password (focused)</span><input class="focused" type="password" value="••••••••" /></label>
  </div>
</body>
</html>
