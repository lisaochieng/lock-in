<!-- @dsCard group="Components" name="Hero landing" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero landing</title>
<style>
  :root {
    --accent: #f0d07d;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    padding: 24px;
    text-align: center;
    color: #fff8eb;
  }
  .hero-gradient {
    position: absolute;
    inset: -25%;
    z-index: -3;
    background: linear-gradient(130deg, #0e1714 0%, #143028 22%, #1c4a40 42%, #2a4d3a 58%, #4a4326 76%, #3a2a3a 100%);
  }
  .hero-orb { position: absolute; z-index: -2; border-radius: 50%; filter: blur(70px); opacity: 0.55; }
  .hero-orb-a { width: 46vw; height: 46vw; top: -10vw; left: -8vw; background: radial-gradient(circle, rgba(155, 214, 196, 0.65), transparent 68%); }
  .hero-orb-b { width: 40vw; height: 40vw; bottom: -12vw; right: -6vw; background: radial-gradient(circle, rgba(247, 218, 144, 0.5), transparent 68%); }
  .hero-content { display: grid; justify-items: center; gap: 18px; max-width: 560px; }
  .hero-mark {
    display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px;
    border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 999px;
    background: rgba(255, 255, 255, 0.07); color: rgba(255, 249, 235, 0.82);
    font-size: 0.82rem; letter-spacing: 0.04em;
  }
  .hero-title { margin: 0; font-size: clamp(3.6rem, 13vw, 7.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 0.95; color: #fff9ef; }
  .hero-tagline { margin: 0; font-size: clamp(1rem, 2.4vw, 1.3rem); color: rgba(255, 249, 235, 0.74); max-width: 30ch; }
  .hero-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; margin-top: 8px; }
  .hero-button {
    min-width: 148px; min-height: 50px; padding: 0 26px;
    border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 999px;
    background: rgba(255, 255, 255, 0.08); color: #fff8eb; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  .hero-button-primary { border-color: rgba(247, 218, 144, 0.88); background: var(--accent); color: #161817; font-weight: 800; }
</style>
</head>
<body>
  <div class="hero">
    <div class="hero-gradient" aria-hidden="true"></div>
    <div class="hero-orb hero-orb-a" aria-hidden="true"></div>
    <div class="hero-orb hero-orb-b" aria-hidden="true"></div>
    <main class="hero-content">
      <span class="hero-mark">🔒 a calm study room</span>
      <h1 class="hero-title">lock in</h1>
      <p class="hero-tagline">find your focus and study softly, together.</p>
      <div class="hero-actions">
        <button class="hero-button">log in</button>
        <button class="hero-button hero-button-primary">sign up</button>
      </div>
    </main>
  </div>
</body>
</html>
