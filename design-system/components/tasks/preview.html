<!-- @dsCard group="Widgets" name="Task list" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Task list</title>
<style>
  :root {
    --accent: #f1d37f;
    --accent-2: #9bd6c4;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px;
    background: radial-gradient(circle at 22% 18%, #15211c, #0c100e 72%); color: #fff8eb;
  }
  .widget {
    width: min(350px, calc(100vw - 48px)); padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 8px;
    background: rgba(9, 13, 12, 0.58); box-shadow: 0 26px 70px rgba(0, 0, 0, 0.25);
  }
  .panel-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .panel-title h2 { flex: 1; margin: 0; font-size: 0.98rem; }
  .task-form { display: grid; grid-template-columns: 1fr 58px; gap: 8px; }
  .task-form input {
    min-height: 38px; border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 7px;
    background: rgba(255, 255, 255, 0.08); color: #fff9ef; outline: none; padding: 0 11px; font: inherit;
  }
  .task-form button {
    min-height: 36px; border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 7px;
    background: rgba(255, 255, 255, 0.08); color: #fff8eb; cursor: pointer;
  }
  .task-list { display: grid; gap: 8px; margin-top: 12px; }
  .task { display: grid; grid-template-columns: 22px 1fr 28px; align-items: center; gap: 8px; min-height: 36px; }
  .task .box {
    display: grid; place-items: center; width: 22px; height: 22px;
    border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 6px; color: transparent;
  }
  .task.done .box {
    border-color: var(--accent-2); background: color-mix(in srgb, var(--accent-2) 22%, transparent); color: #d7fff2;
  }
  .task .title { color: #fff8eb; }
  .task.done .title { color: rgba(255, 249, 235, 0.56); text-decoration: line-through; }
  .task .del { width: 28px; height: 28px; border: 0; border-radius: 6px; background: transparent; color: rgba(255, 249, 235, 0.6); cursor: pointer; }
</style>
</head>
<body>
  <section class="widget">
    <div class="panel-title"><h2>tasks</h2></div>
    <div class="task-form">
      <input placeholder="add a task" />
      <button>add</button>
    </div>
    <div class="task-list">
      <div class="task done"><span class="box">✓</span><span class="title">read chapter 4</span><button class="del">✕</button></div>
      <div class="task"><span class="box"></span><span class="title">finish problem set</span><button class="del">✕</button></div>
      <div class="task"><span class="box"></span><span class="title">review flashcards</span><button class="del">✕</button></div>
    </div>
  </section>
</body>
</html>
