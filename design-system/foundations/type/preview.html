<!-- @dsCard group="Foundations" name="Type scale" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Type scale</title>
<style>
  :root {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    padding: 44px;
    background: radial-gradient(circle at 20% 18%, #15211c, #0c100e 72%);
    color: #fff8eb;
  }
  .row { display: grid; gap: 4px; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
  .row:last-child { border-bottom: 0; }
  .tag { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255, 249, 235, 0.5); }
  .display { font-size: 4rem; font-weight: 800; letter-spacing: -0.03em; line-height: 0.95; }
  .title { font-size: 1.4rem; font-weight: 800; }
  .body { font-size: 1rem; color: rgba(255, 249, 235, 0.82); }
  .small { font-size: 0.8rem; color: rgba(255, 249, 235, 0.66); }
</style>
</head>
<body>
  <div class="row"><span class="tag">Display / 800</span><div class="display">lock in</div></div>
  <div class="row"><span class="tag">Title / 800</span><div class="title">create your account</div></div>
  <div class="row"><span class="tag">Body / 400</span><div class="body">find your focus and study softly, together.</div></div>
  <div class="row"><span class="tag">Small / muted</span><div class="small">pick up right where you left off.</div></div>
</body>
</html>
